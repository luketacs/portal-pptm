name: Sync Apontamentos (SIGMA → Supabase)

on:
  schedule:
    - cron: '0 * * * *'   # a cada hora
  workflow_dispatch:        # permite rodar manualmente

jobs:
  sync:
    name: Importar apontamentos do SIGMA
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências (xlsx)
        run: npm install --no-audit --no-fund

      - name: Executar sync
        run: node .github/scripts/sync-apontamentos.mjs
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
