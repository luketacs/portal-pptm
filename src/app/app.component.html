<app-notification />
@if (shouldShowAuthTransition()) {
  <!-- Show loading while auth state is transitioning -->
  <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%); flex-direction: column; gap: 20px;">
    <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="color: white; font-size: 16px; margin: 0;">
      @if (authService.isLoggingOut()) {
        Saindo...
      } @else if (authService.isAuthenticating()) {
        Entrando...
      } @else {
        Carregando...
      }
    </p>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </div>
} @else if (currentUser() && !isPublicAuthRoute()) {
  <!-- Show dashboard for authenticated users -->
  <div class="app-shell">
    <app-sidebar />
    <div class="flex flex-col flex-1">
      <app-header class="sticky top-0 z-10 app-header" />
      <main class="flex-1 overflow-y-auto p-4 md:p-8 app-main">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <!-- Show login page for unauthenticated users -->
  <router-outlet />
}
